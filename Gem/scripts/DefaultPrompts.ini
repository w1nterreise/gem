# ==================================================================
# КОНФИГУРАЦИЯ ПРОМПТОВ ДЛЯ ПРИЛОЖЕНИЯ "GEM"
# ==================================================================
#
# Управление:
# - Простой клик ПКМ   -> Режим Терминала (мгновенная отправка буфера обмена)
# - Ctrl + ПКМ         -> Контекстное меню из секции [CTRL]
# - Shift + ПКМ        -> Контекстное меню из секции [SHIFT]
# - Alt + ПКМ          -> Контекстное меню из секции [ALT]
# - Ctrl + Shift + ПКМ -> Системное меню браузера Chromium
#
# Использование плейсхолдера {clip}:
# - Разместите {clip} в любом месте шаблона промпта.
#   Gem автоматически заменит его на текущий текст из буфера.
# - Если {clip} не указан, Gem отправит промпт как статичную команду,
#   а содержимое буфера обмена будет полностью проигнорировано.
#
# Правила синтаксиса:
# - Строки, начинающиеся с '#', считаются комментариями.
# - Разделяйте промпты внутри секции ДВУМЯ переносами строки (пустой строкой).
# - Итоговый запрос не должен превышать 6000 символов.

[CTRL]
Переведи следующий текст на английский язык, сохранив профессиональный тон:
{clip}

Продолжи писать текст с того места, на котором остановился ИИ в предыдущем ответе.

Придумай абсурдное и нелепое оправдание для начальника, почему я опоздал на созвон. Начни со слов: 'Вы не поверите, но...'

[SHIFT]
Проанализируй этот фрагмент кода:
```
{clip}
```
Найди потенциальные уязвимости или баги и предложи исправленный вариант.

